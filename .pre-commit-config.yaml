# Pre-commit configuration — orchestrates Ruff, Pyright, and a pytest smoke
# pass per ADR-0010.
#
# Frontend hooks (ESLint + Prettier) land alongside the Angular app in a
# follow-up plan. The Markdown / YAML formatter hook here covers documentation
# until then.

minimum_pre_commit_version: "3.7.0"

default_language_version:
  python: python3.13

repos:
  # Ruff: lint + format. Pinned via pyproject.toml dev group as well; this
  # mirror gives us the editor-side autofix path.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.5.7
    hooks:
      - id: ruff
        args: [--fix]
        files: ^(backend|cli)/.*\.py$
      - id: ruff-format
        files: ^(backend|cli)/.*\.py$

  - repo: local
    hooks:
      - id: pyright-backend
        name: pyright backend (strict)
        language: system
        types: [python]
        files: ^backend/.*\.py$
        pass_filenames: false
        entry: bash -lc 'cd backend && uv run pyright'

      - id: pyright-cli
        name: pyright cli (strict)
        language: system
        types: [python]
        files: ^cli/.*\.py$
        pass_filenames: false
        entry: bash -lc 'cd cli && uv run pyright'

      - id: check-rest-docstrings
        name: reST docstrings (classes and callables)
        language: system
        types: [python]
        files: ^(backend|cli|scripts)/.*\.py$
        pass_filenames: false
        entry: bash -lc 'uv run python scripts/check_rest_docstrings.py'

      - id: pytest-backend
        name: pytest backend
        language: system
        types: [python]
        files: ^backend/.*\.py$
        pass_filenames: false
        entry: bash -lc 'cd backend && uv run pytest -q --no-header'

      - id: pytest-cli
        name: pytest cli
        language: system
        types: [python]
        files: ^cli/.*\.py$
        pass_filenames: false
        entry: bash -lc 'cd cli && uv run pytest -q --no-header'

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]

  # Markdown / YAML formatting until the frontend Prettier hook lands.
  - repo: https://github.com/rbubley/mirrors-prettier
    rev: v3.3.3
    hooks:
      - id: prettier
        types_or: [markdown, yaml, json]
        exclude: ^(backend/)?uv\.lock$|^uv\.lock$
