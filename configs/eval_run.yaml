# Default evaluation run composition for ``python -m cli.entrypoint``.
#
# From the repository root:
#
#     uv run --project cli python -m cli.entrypoint
#     uv run --project cli python -m cli.entrypoint sampling=greedy
#     uv run --project cli python -m cli.entrypoint sampling.temperature=0.7
#     uv run --project cli python -m cli.entrypoint --multirun seed=0,1,2
#
# ADR: CLI Configuration with Hydra and hydra-zen
# See: adr/0007-cli-configuration-with-hydra-and-hydra-zen.md

defaults:
  - model: mock
  - dataset: mock
  - metrics: default
  - engine: local
  - sampling: default
  - output: default
  - _self_

run_id: PLACEHOLDER # replaced with a generated id when still PLACEHOLDER
title: walking-skeleton mock run
seed: 0

hydra:
  job:
    chdir: false
