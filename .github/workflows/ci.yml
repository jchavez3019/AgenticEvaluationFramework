name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  workspace-check:
    name: workspace / sync + backend + cli checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Set up Python 3.13
        run: uv python install 3.13

      - name: Sync workspace
        run: uv sync --all-packages --all-extras --dev

      - name: reST docstrings (backend, cli, scripts)
        run: uv run python scripts/check_rest_docstrings.py

      - name: Ruff backend (lint)
        run: cd backend && uv run ruff check . tests

      - name: Ruff backend (format)
        run: cd backend && uv run ruff format --check . tests

      - name: Pyright backend
        run: cd backend && uv run pyright

      - name: Pytest backend
        run: cd backend && uv run pytest

      - name: Ruff cli (lint)
        run: cd cli && uv run ruff check . tests

      - name: Ruff cli (format)
        run: cd cli && uv run ruff format --check . tests

      - name: Pyright cli
        run: cd cli && uv run pyright

      - name: Pytest cli
        run: cd cli && uv run pytest

      - name: Pre-commit
        run: |
          uv tool install pre-commit
          uv tool run pre-commit run --all-files

  # Gated jobs — populated as the corresponding milestones land. They are
  # documented here so contributors see the deselected markers up-front.
  gpu-tests:
    name: gpu / @pytest.mark.gpu (deselected by default)
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "GPU runner placeholder; activated in a future milestone."

  network-tests:
    name: network / @pytest.mark.network (deselected by default)
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Network runner placeholder; activated in a future milestone."

  broker-tests:
    name: broker / @pytest.mark.broker (deselected by default)
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Broker runner placeholder; activated alongside DistributedEngine."

  docker-tests:
    name: docker / @pytest.mark.docker (deselected by default)
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Docker runner placeholder; activated alongside the frontend Docker dev env."
